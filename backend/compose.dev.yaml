services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: private-kb-qa-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: private_kb_qa
    ports:
      - "55432:5432"
    volumes:
      - private-kb-qa-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d private_kb_qa"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

volumes:
  private-kb-qa-postgres-data:
