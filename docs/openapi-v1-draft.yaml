  /knowledge-bases/{kbId}/documents:
    get:
      tags: [KnowledgeBases]
      summary: List documents in a knowledge base
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/KnowledgeBaseIdParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Document list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
    post:
      tags: [KnowledgeBases]
      summary: Upload a document into the knowledge base
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/KnowledgeBaseIdParam'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Upload accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentUploadResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '409':
          description: Duplicate document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Unsupported file type or file too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Storage or task dispatch failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /knowledge-bases/{kbId}/documents/{docId}:
