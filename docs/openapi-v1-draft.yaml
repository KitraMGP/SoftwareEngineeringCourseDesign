openapi: 3.0.3
info:
  title: Private Knowledge QA System API
  version: 0.1.0-current-backend
  description: >
    OpenAPI specification synchronized with the current Go backend implementation.
    This document intentionally reflects the actual runtime behavior, including
    placeholder SSE responses and endpoints that currently return 501 Not Implemented.
servers:
  - url: /api/v1
tags:
  - name: Auth
  - name: Users
  - name: Sessions
  - name: KnowledgeBases
  - name: Admin
paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Register success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          $ref: '#/components/responses/ValidationErrorResponse'
        '409':
          description: Username or email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/login:
    post:
      tags: [Auth]
      summary: Login with username or email
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login success
          headers:
            Set-Cookie:
              schema:
                type: string
              description: HttpOnly refresh token cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/ValidationErrorResponse'
        '401':
          description: Invalid credentials or frozen account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh token and issue a new access token
      description: >
        The current backend first tries to read the refresh token from the
        `refresh_token` cookie. If the cookie is missing, it then tries to read
        `refresh_token` from the JSON body.
      security:
        - refreshTokenCookie: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Refresh success
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Rotated refresh token cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshTokenResponse'
        '401':
          description: Refresh token missing, invalid, expired, or account frozen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout current session
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleSuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
  /users/me:
    get:
      tags: [Users]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
    put:
      tags: [Users]
      summary: Update current user profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
  /users/me/password:
    put:
      tags: [Users]
      summary: Change current user password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleSuccessResponse'
        '400':
          description: Old password incorrect or new password validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
  /sessions:
    get:
      tags: [Sessions]
      summary: List sessions
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - $ref: '#/components/parameters/KeywordParam'
      responses:
        '200':
          description: Session list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
    post:
      tags: [Sessions]
      summary: Create a new session
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '200':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSessionResponse'
        '400':
          $ref: '#/components/responses/ValidationErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
  /sessions/{sessionId}:
    get:
      tags: [Sessions]
      summary: Get session detail with messages
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SessionIdParam'
      responses:
        '200':
          description: Session detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionDetailResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
    delete:
      tags: [Sessions]
      summary: Soft delete a session
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SessionIdParam'
      responses:
        '200':
          description: Session deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleSuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
  /sessions/{sessionId}/messages:
    post:
      tags: [Sessions]
      summary: Stream an assistant reply for a session
      description: >
        The backend now supports basic SSE chat for sessions that are not bound
        to a knowledge base. The current implementation uses DeepSeek as the
        provider, persists the user and assistant messages, and returns stream
        events in the order `meta`, `delta`, `done`. Provider failures are
        emitted as `event: error` inside the stream after the HTTP status has
        already been set to `200`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SessionIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '200':
          description: SSE stream for the assistant reply
          content:
            text/event-stream:
              schema:
                type: string
                example: |-
                  event: meta
                  data: {"message_id":"9f45c628-8a1a-49ea-a714-e8354d4f3fdc","grounded":false,"model":"deepseek-chat"}

                  event: delta
                  data: {"content":"你好，"}

                  event: delta
                  data: {"content":"我可以帮你解释这个系统。"}

                  event: done
                  data: {"finish_reason":"stop"}
        '400':
          $ref: '#/components/responses/ValidationFailedResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '501':
          $ref: '#/components/responses/FeatureNotReadyResponse'
  /sessions/{sessionId}/messages/{messageId}/regenerate:
    post:
      tags: [Sessions]
      summary: Regenerate an existing assistant answer
      description: This endpoint currently returns 501 Not Implemented.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SessionIdParam'
        - $ref: '#/components/parameters/MessageIdParam'
      responses:
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '501':
          $ref: '#/components/responses/FeatureNotReadyResponse'
  /sessions/{sessionId}/stream/stop:
    post:
      tags: [Sessions]
      summary: Stop current streaming task for the session
      description: This endpoint currently returns 501 Not Implemented.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SessionIdParam'
      responses:
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '501':
          $ref: '#/components/responses/FeatureNotReadyResponse'
  /knowledge-bases:
    get:
      tags: [KnowledgeBases]
      summary: List knowledge bases
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
