      responses:
        '200':
          description: Knowledge base updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeBaseDetailResponse'
        '400':
          $ref: '#/components/responses/ValidationErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
    delete:
      tags: [KnowledgeBases]
      summary: Soft delete a knowledge base
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/KnowledgeBaseIdParam'
      responses:
        '200':
          description: Knowledge base deleted
          content:
            application/json:
              schema:
