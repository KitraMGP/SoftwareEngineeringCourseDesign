components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    refreshTokenCookie:
      type: apiKey
      in: cookie
      name: refresh_token
  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    SizeParam:
      name: size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    KeywordParam:
      name: keyword
      in: query
      schema:
        type: string
    SessionIdParam:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MessageIdParam:
      name: messageId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    KnowledgeBaseIdParam:
      name: kbId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DocumentIdParam:
      name: docId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TaskIdParam:
      name: taskId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PolicyIdParam:
      name: policyId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserIdParam:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProviderParam:
      name: provider
      in: path
      required: true
      schema:
        type: string
  responses:
    UnauthorizedResponse:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ForbiddenResponse:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundResponse:
      description: Resource not found
      content:
